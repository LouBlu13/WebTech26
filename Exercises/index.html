<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebTech25 - Exercise Index</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 40px 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        text-align: center;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 40px;
        font-size: 14px;
      }

      .exercises {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .exercise-card {
        background: #f8f9fa;
        border: 2px solid #667eea;
        border-radius: 8px;
        padding: 20px;
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100px;
      }

      .exercise-card:hover {
        background: #667eea;
        color: white;
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      }

      .exercise-card span {
        font-weight: 600;
        font-size: 16px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎓 WebTech25</h1>
      <p class="subtitle">Click on an exercise to open it</p>

      <div class="exercises">
        <a
          href="file:///C:/Users/blume/OneDrive/Desktop/WebTecnoligis/WebTech26/exercise1.1/"
          class="exercise-card"
        >
          <span>Exercise 1.1</span>
        </a>
        <a href="/exercise1.2/" class="exercise-card">
          <span>Exercise 1.2</span>
        </a>
        <a href="/exercise2.1/" class="exercise-card">
          <span>Exercise 2.1</span>
        </a>
        <a href="/exercise2.2/" class="exercise-card">
          <span>Exercise 2.2</span>
        </a>
        <a href="/exercise3.1/" class="exercise-card">
          <span>Exercise 3.1</span>
        </a>
        <a href="exercise3.2/" class="exercise-card">
          <span>Exercise 3.2</span>
        </a>
      </div>
    </div>
  </body>
</html>
